<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ArgoCD hub-and-spoke architecture</title>
<desc>A platform hub cluster running ArgoCD registers and deploys to two separate workload clusters, dev and prod, each running application pods only.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="520" fill="#ffffff"/>

<rect x="220" y="40" width="240" height="110" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#26215C">Platform cluster (hub)</text>
<text x="340" y="92" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Runs ArgoCD only</text>
<text x="340" y="112" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Registers dev + prod</text>
<text x="340" y="130" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">as destination clusters</text>

<path d="M260 150 L160 240" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M420 150 L520 240" fill="none" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

<text x="150" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">deploys</text>
<text x="530" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">deploys</text>

<rect x="40" y="240" width="240" height="200" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="160" y="268" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#04342C">Dev cluster (spoke)</text>
<text x="160" y="292" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">Workloads only</text>
<text x="160" y="310" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#085041">No ArgoCD installed</text>

<rect x="64" y="334" width="80" height="76" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="104" y="358" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#04342C">23</text>
<text x="104" y="376" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#04342C">services</text>

<rect x="176" y="334" width="80" height="76" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="216" y="358" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#04342C">postgres</text>
<text x="216" y="376" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#04342C">on EBS</text>

<rect x="400" y="240" width="240" height="200" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="520" y="268" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">Prod cluster (spoke)</text>
<text x="520" y="292" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">Workloads only</text>
<text x="520" y="310" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#712B13">No ArgoCD installed</text>

<rect x="424" y="334" width="80" height="76" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="464" y="358" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#4A1B0C">23</text>
<text x="464" y="376" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#4A1B0C">services</text>

<rect x="536" y="334" width="80" height="76" rx="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="576" y="358" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#4A1B0C">RDS</text>
<text x="576" y="376" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="12" fill="#4A1B0C">PostgreSQL</text>

<text x="340" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">Each spoke registers itself with the hub via a Terraform-created secret</text>
<text x="340" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5F5E5A">containing its endpoint, CA certificate, and a cluster-admin bearer token</text>
</svg>
