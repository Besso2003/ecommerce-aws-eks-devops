apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: ghcr.io/open-telemetry/demo:latest-kafka
          imagePullPolicy: Always
          ports:
            - containerPort: 9092
          envFrom:
            - configMapRef:
                name: kafka-config
          resources:
            requests:
              cpu: 200m
              memory: 400Mi
            limits:
              cpu: 500m
              memory: 600Mi