apiVersion: apps/v1
kind: Deployment
metadata:
  name: email
  labels:
    app: email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email
  template:
    metadata:
      labels:
        app: email
    spec:
      serviceAccountName: email-sa
      containers:
        - name: email
          image: ghcr.io/open-telemetry/demo:latest-emailservice
          imagePullPolicy: Always
          ports:
            - containerPort: 6060
          envFrom:
            - configMapRef:
                name: email-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi