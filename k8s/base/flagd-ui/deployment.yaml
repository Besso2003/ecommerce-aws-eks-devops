apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagd-ui
  labels:
    app: flagd-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flagd-ui
  template:
    metadata:
      labels:
        app: flagd-ui
    spec:
      containers:
        - name: flagd-ui
          image: ghcr.io/open-telemetry/demo:latest-flagdui
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: flagd-ui-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi