apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: checkout
          image: 707938860152.dkr.ecr.eu-north-1.amazonaws.com/ecommerce-prod/checkout:c58583b
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi