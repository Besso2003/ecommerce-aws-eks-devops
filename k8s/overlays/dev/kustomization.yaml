apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base/product-catalog
  - ../../base/ad-service
  - ../../base/recommendation-service
  - ../../base/currency
  - ../../base/email
  - ../../base/payment
  - ../../base/quote
  - ../../base/shipping
  - ../../base/cart
  - ../../base/checkout
  - ../../base/fraud-detection
  - ../../base/accounting
  - ../../base/product-reviews
  - ../../base/image-provider

patches:
  - path: patches/product-catalog-patch.yaml
    target:
      kind: Deployment
      name: product-catalog
  - path: patches/ad-service-patch.yaml
    target:
      kind: Deployment
      name: ad-service
  - path: patches/recommendation-service-patch.yaml
    target:
      kind: Deployment
      name: recommendation-service
  - path: patches/currency-patch.yaml
    target:
      kind: Deployment
      name: currency
  - path: patches/email-patch.yaml
    target:
      kind: Deployment
      name: email
  - path: patches/payment-patch.yaml
    target:
      kind: Deployment
      name: payment
  - path: patches/quote-patch.yaml
    target:
      kind: Deployment
      name: quote
  - path: patches/shipping-patch.yaml
    target:
      kind: Deployment
      name: shipping
  - path: patches/cart-patch.yaml
    target:
      kind: Deployment
      name: cart
  - path: patches/checkout-patch.yaml
    target:
      kind: Deployment
      name: checkout
  - path: patches/fraud-detection-patch.yaml
    target:
      kind: Deployment
      name: fraud-detection
  - path: patches/accounting-patch.yaml
    target:
      kind: Deployment
      name: accounting
  - path: patches/product-reviews-patch.yaml
    target:
      kind: Deployment
      name: product-reviews
  - path: patches/image-provider-patch.yaml
    target:
      kind: Deployment
      name: image-provider